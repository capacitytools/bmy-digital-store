            const mins = Math.floor(cbtState.time / 60);
            const secs = cbtState.time % 60;
            
            let html = `<div class="cbt-timer">⏱️ ${mins}:${secs.toString().padStart(2,'0')}</div>`;
            html += `<div class="cbt-question"><strong>Q${cbtState.index + 1}/10:</strong> ${q.q}</div>`;
                        const labels = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, idx) => {
                html += `<div class="cbt-option" onclick="checkAnswer(${idx}, this)"><span>${labels[idx]}.</span> ${opt}</div>`;
            });
            
            document.getElementById('cbtContent').innerHTML = html;
        }

        function checkAnswer(selected, element) {
            const options = document.querySelectorAll('.cbt-option');
            options.forEach(opt => opt.style.pointerEvents = 'none');
            
            const correct = cbtState.questions[cbtState.index].a;
            if (selected === correct) {
                element.classList.add('correct');
                cbtState.score++;
                document.getElementById('cbtScore').innerText = `${cbtState.score}/10`;
            } else {
                element.classList.add('wrong');
                options[correct].classList.add('correct');
            }
            
            setTimeout(() => {
                cbtState.index++;
                if (cbtState.index < 10) {
                    showQuestion();
                } else {
                    clearInterval(cbtState.timer);
                    endQuiz();
                }
            }, 1500);
        }

        function endQuiz() {
            const score = cbtState.score;
            let html = `<h3 style="color:var(--millionaire-gold); margin: 20px 0; text-align: center;">Quiz Complete!</h3>`;
            html += `<div class="cbt-question" style="text-align: center;"><h2 style="color: white; margin-bottom: 15px;">Score: ${score}/10</h2>`;
            
            if (score === 10) {
                html += `<p style="color:var(--millionaire-gold); font-size: 1.3rem; font-weight: bold;">🏆 GRAND WINNER! 🏆</p>
                         <p>Click below to email your details for rewards!</p>
                         <a href="mailto:${adminEmail}?subject=Millionaire Winner: ${encodeURIComponent(cbtState.name)}&body=Name: ${encodeURIComponent(cbtState.name)}%0D%0AEmail: ${encodeURIComponent(cbtState.email)}%0D%0ACategory: ${encodeURIComponent(cbtState.category)}%0D%0AScore: 10/10" class="cbt-btn" style="text-decoration: none; display: inline-block; margin-top: 15px;">📧 Claim Reward</a>`;
            } else if (score >= 7) {
                html += `<p style="color:var(--green-accent); font-weight: bold;">✅ PASSED! Score above 6.</p>
                         <p>You can advance to higher level!</p>
                         <button class="cbt-btn" onclick="showCategories()">Play Another Category</button>`;
            } else {
                html += `<p style="color:var(--red-accent); font-weight: bold;">❌ Need 7/10 to pass.</p>
                         <button class="cbt-btn" onclick="showCategories()">Try Again</button>`;
            }            html += `</div>`;
            document.getElementById('cbtContent').innerHTML = html;
        }

            if (cbtState.timer) clearInterval(cbtState.timer);
            document.getElementById('cbtOverlay').classList.remove('active');
