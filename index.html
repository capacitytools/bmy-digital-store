            setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 100);

            // TRIGGER POPUNDER ONLY FOR BOOKS AND COURSES
            if (triggerAds) {
                loadPopunder();
            }
        }

        // Dynamically load Popunder ONLY when needed
        function loadPopunder() {
            if (document.getElementById('adsterra-popunder-loaded')) return;
            const script = document.createElement('script');
            script.src = "https://pl29820228.effectivecpmnetwork.com/7f/63/83/7f638315da085a860c6d66deecc31bcd.js";
            script.id = "adsterra-popunder-loaded";
            document.body.appendChild(script);
        }

        function goBack() {
            detailView.classList.remove('active');
            mainView.style.display = 'block';
        }

        renderMenu();
    </script>
</body>
